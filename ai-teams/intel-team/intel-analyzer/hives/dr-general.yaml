version: 3
hives:
  dr-general:
    intel-analyzer-on-mention:
      data:
        detect:
          event: case_note_added
          op: and
          rules:
            - op: contains
              path: event/metadata/content
              value: "@intel-analyzer"
            - op: is
              path: event/metadata/permitted/?
              value: ai_agent.exec
        respond:
          - action: start ai agent
            definition: hive://ai_agent/intel-analyzer
            suppression:
              is_global: true
              keys:
                - "intel-analyzer-{{ .event.case_id }}"
              max_count: 1
              period: 30m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-team:intel-team:analyzer
