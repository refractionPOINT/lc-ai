version: 3
hives:
  dr-general:
    intel-collector-daily:
      data:
        detect:
          event: 24h_per_org
          op: exists
          path: /
          target: schedule
        respond:
          - action: start ai agent
            definition: hive://ai_agent/intel-collector
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-team:intel-team:collector
          - ai-rel:intel-team:role:agent:collector
