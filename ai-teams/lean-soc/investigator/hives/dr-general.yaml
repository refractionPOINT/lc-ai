version: 3
hives:
  dr-general:
    lean-investigator-on-case-created:
      data:
        detect:
          event: case_created
          op: exists
          path: event/case_id
        respond:
          - action: start ai agent
            definition: hive://ai_agent/lean-investigator
            suppression:
              is_global: true
              keys:
                - lean-investigator-rate-limit
              max_count: 10
              period: 1m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-team:lean-soc:investigator
          - ai-rel:lean-soc:role:agent:investigator
