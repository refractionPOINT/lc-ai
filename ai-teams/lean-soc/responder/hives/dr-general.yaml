version: 3
hives:
  dr-general:
    responder-on-mention:
      data:
        detect:
          event: case_note_added
          op: and
          rules:
            - op: contains
              path: event/metadata/content
              value: "@responder"
            - op: is
              path: event/metadata/permitted/?
              value: ai_agent.exec
        respond:
          - action: start ai agent
            definition: hive://ai_agent/responder
            suppression:
              is_global: true
              keys:
                - "responder-{{ .event.case_id }}"
              max_count: 1
              period: 30m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-team:lean-soc:responder
          - ai-rel:lean-soc:role:agent:responder
