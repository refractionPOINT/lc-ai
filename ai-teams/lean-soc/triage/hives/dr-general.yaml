version: 3
hives:
  dr-general:
    lean-triage-on-detect:
      data:
        detect:
          target: detection
          op: exists
          path: /
        respond:
          - action: start ai agent
            definition: hive://ai_agent/lean-triage
            suppression:
              is_global: true
              keys:
                - lean-triage-rate-limit
              max_count: 20
              period: 1m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-team:lean-soc:triage
          - ai-rel:lean-soc:role:agent:triage
