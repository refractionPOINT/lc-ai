version: 3
hives:
  dr-general:
    lean-reporter-daily:
      data:
        detect:
          event: 24h_per_org
          op: exists
          path: /
          target: schedule
        respond:
          - action: start ai agent
            definition: hive://ai_agent/lean-reporter
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-team:lean-soc:reporter
