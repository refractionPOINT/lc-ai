version: 3
hives:
  dr-general:
    mdr-intel-scout-daily:
      data:
        detect:
          event: 24h_per_org
          op: exists
          path: /
          target: schedule
        respond:
          - action: start ai agent
            definition: hive://ai_agent/mdr-intel-scout
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-team:mdr-hunting-pipeline-team:intel-scout
