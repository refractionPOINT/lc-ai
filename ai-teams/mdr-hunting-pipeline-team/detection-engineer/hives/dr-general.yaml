version: 3
hives:
  dr-general:
    mdr-detection-engineer-on-mention:
      data:
        detect:
          event: case_note_added
          op: and
          rules:
            - op: contains
              path: event/metadata/content
              value: "@mdr-detection-engineer"
            - op: is
              path: event/metadata/permitted/?
              value: ai_agent.exec
        respond:
          - action: start ai agent
            definition: hive://ai_agent/mdr-detection-engineer
            suppression:
              is_global: true
              keys:
                - "mdr-engineer-{{ .event.case_id }}"
              max_count: 1
              period: 30m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-team:mdr-hunting-pipeline-team:detection-engineer
          - ai-rel:mdr-hunting-pipeline-team:role:agent:detection-engineer
