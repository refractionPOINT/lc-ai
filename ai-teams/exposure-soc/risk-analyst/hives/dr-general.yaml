version: 3
hives:
  dr-general:
    exposure-risk-analyst-on-mention:
      data:
        detect:
          event: case_note_added
          op: and
          rules:
            - op: contains
              path: event/metadata/content
              value: "@exposure-risk-analyst"
            - op: is
              path: event/metadata/permitted/?
              value: ai_agent.exec
        respond:
          - action: start ai agent
            definition: hive://ai_agent/exposure-risk-analyst
            suppression:
              is_global: true
              keys:
                - "exposure-risk-analyst-{{ .event.case_id }}"
              max_count: 1
              period: 30m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-team:exposure-soc:risk-analyst
