version: 3
hives:
  dr-general:
    bas-reviewer-on-mention:
      data:
        detect:
          event: case_note_added
          op: and
          rules:
            - op: contains
              path: event/metadata/content
              value: "@bas-reviewer"
            - op: is
              path: event/metadata/permitted/?
              value: ai_agent.exec
        respond:
          - action: start ai agent
            definition: hive://ai_agent/bas-reviewer
            suppression:
              is_global: true
              keys:
                - "bas-reviewer-{{ .event.case_id }}"
              max_count: 1
              period: 30m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-team:bas-team:reviewer
          - ai-rel:bas-team:role:agent:reviewer
