version: 3
hives:
  dr-general:
    exposure-scanner-on-mention:
      data:
        detect:
          event: case_note_added
          op: and
          rules:
            - op: contains
              path: event/metadata/content
              value: "@exposure-scanner"
            - op: is
              path: event/metadata/permitted/?
              value: ai_agent.exec
        respond:
          - action: start ai agent
            definition: hive://ai_agent/exposure-scanner
            suppression:
              is_global: true
              keys:
                - "exposure-scanner-{{ .event.case_id }}"
              max_count: 1
              period: 30m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - lc-soc:exposure-soc:scanner
