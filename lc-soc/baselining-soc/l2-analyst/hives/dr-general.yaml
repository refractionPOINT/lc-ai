version: 3
hives:
  dr-general:
    soc-l2-on-case-escalated:
      data:
        detect:
          event: case_escalated
          op: exists
          path: event/case_id
        respond:
          - action: start ai agent
            definition: hive://ai_agent/soc-l2-analyst
            suppression:
              is_global: true
              keys:
                - "soc-l2-{{ .event.case_id }}"
              max_count: 1
              period: 30m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - lc-soc:baselining-soc:l2-analyst
