version: 3
hives:
  dr-general:
    lean-investigator-on-ticket-created:
      data:
        detect:
          event: created
          op: exists
          path: event/ticket_id
        respond:
          - action: start ai agent
            definition: hive://ai_agent/lean-investigator
            suppression:
              is_global: true
              keys:
                - lean-investigator-rate-limit
              max_count: 10
              period: 1m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - lc-soc:lean-soc:investigator
