version: 3
hives:
  dr-general:
    lean-responder-on-tag:
      data:
        detect:
          event: tags_updated
          op: contains
          path: event/metadata/new_tags
          value: needs-containment
        respond:
          - action: start ai agent
            definition: hive://ai_agent/lean-responder
            suppression:
              is_global: true
              keys:
                - "lean-responder-{{ .event.ticket_id }}"
              max_count: 1
              period: 30m
      usr_mtd:
        enabled: true
        expiry: 0
        tags: []
