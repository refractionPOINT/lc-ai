version: 3
hives:
  dr-general:
    endpoint-compliance-checker-daily:
      data:
        detect:
          event: 24h_per_org
          op: exists
          path: /
          target: schedule
        respond:
          - action: start ai agent
            definition: hive://ai_agent/endpoint-compliance-checker
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - lc-soc:compliance-soc:endpoint-checker
