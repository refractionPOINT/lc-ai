version: 3
hives:
  dr-general:
    compliance-auditor-daily:
      data:
        detect:
          event: 24h_per_org
          op: exists
          path: /
          target: schedule
        respond:
          - action: start ai agent
            definition: hive://ai_agent/compliance-auditor
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - lc-soc:compliance-soc:auditor
