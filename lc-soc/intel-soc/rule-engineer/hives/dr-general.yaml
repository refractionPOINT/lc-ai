version: 3
hives:
  dr-general:
    intel-engineer-on-tag:
      data:
        detect:
          event: tags_updated
          op: is
          path: event/metadata/new_tags/?
          value: intel-analyzed
        respond:
          - action: start ai agent
            definition: hive://ai_agent/intel-engineer
            suppression:
              is_global: true
              keys:
                - "intel-engineer-{{ .event.case_id }}"
              max_count: 1
              period: 30m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - lc-soc:intel-soc:engineer
