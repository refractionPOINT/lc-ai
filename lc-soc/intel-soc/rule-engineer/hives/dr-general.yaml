version: 3
hives:
  dr-general:
    intel-engineer-on-mention:
      data:
        detect:
          op: and
          rules:
            - event: note_added
              op: contains
              path: event/metadata/content
              value: "@rule-engineer"
            - op: is
              path: event/metadata/permitted/?
              value: ai_agent.exec
        respond:
          - action: start ai agent
            definition: hive://ai_agent/intel-engineer
            suppression:
              is_global: true
              keys:
                - "intel-engineer-{{ .event.case_id }}"
              max_count: 1
              period: 30m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - lc-soc:intel-soc:engineer
