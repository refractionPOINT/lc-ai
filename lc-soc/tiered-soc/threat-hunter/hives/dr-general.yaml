version: 3
hives:
  dr-general:
    soc-threat-hunter-on-mention:
      data:
        detect:
          event: note_added
          op: and
          rules:
            - op: contains
              path: event/metadata/content
              value: "@soc-threat-hunter"
            - op: is
              path: event/metadata/permitted/?
              value: ai_agent.exec
        respond:
          - action: start ai agent
            definition: hive://ai_agent/soc-threat-hunter
            suppression:
              is_global: true
              keys:
                - "soc-hunt-{{ .event.case_id }}"
              max_count: 1
              period: 30m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - lc-soc:tiered-soc:threat-hunter
