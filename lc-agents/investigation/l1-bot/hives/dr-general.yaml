version: 3
hives:
  dr-general:
    l1-bot-ticket-triage:
      data:
        detect:
          event: created
          op: exists
          path: event/ticket_id
        respond:
          - action: start ai agent
            definition: hive://ai_agent/l1-bot
            data:
              oid: "{{ .routing.oid }}"
              ticket_id: "{{ .event.ticket_id }}"
              ticket_number: "{{ .event.ticket_number }}"
              severity: "{{ .event.metadata.severity }}"
              detection_cat: "{{ .event.metadata.detection_cat }}"
            suppression:
              is_global: true
              keys:
                - l1-bot-rate-limit
              max_count: 10
              period: 1m
      usr_mtd:
        enabled: true
        expiry: 0
        tags: []
