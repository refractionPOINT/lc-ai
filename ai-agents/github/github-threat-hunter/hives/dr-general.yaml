version: 3
hives:
  dr-general:
    github-threat-hunter-daily:
      data:
        detect:
          event: 24h_per_org
          op: exists
          path: /
        respond:
          - action: start ai agent
            definition: hive://ai_agent/github-threat-hunter
            suppression:
              is_global: true
              keys:
                - github-threat-hunter-rate-limit
              max_count: 2
              period: 24h
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-agent:github-threat-hunter
