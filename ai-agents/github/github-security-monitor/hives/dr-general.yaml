version: 3
hives:
  dr-general:
    github-monitor-branch-prot-removed:
      data:
        detect:
          event: protected_branch.destroy
          op: exists
          path: event/org
        respond:
          - action: start ai agent
            definition: hive://ai_agent/github-security-monitor
            suppression:
              is_global: true
              keys:
                - github-monitor-rate-limit
              max_count: 5
              period: 1m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-agent:github-security-monitor
          - ai-rel:standalone:role:agent:github-security-monitor
