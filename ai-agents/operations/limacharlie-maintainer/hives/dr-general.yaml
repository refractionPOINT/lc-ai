version: 3
hives:
  dr-general:
    limacharlie-maintainer-daily:
      data:
        detect:
          event: 24h_per_org
          op: exists
          path: /
          target: schedule
        respond:
          - action: start ai agent
            definition: hive://ai_agent/limacharlie-maintainer
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-agent:limacharlie-maintainer
          - ai-rel:standalone:role:agent:limacharlie-maintainer
