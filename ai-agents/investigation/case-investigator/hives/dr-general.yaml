version: 3
hives:
  dr-general:
    case-investigator-on-detection-added:
      data:
        detect:
          event: case_detection_added
          op: exists
          path: event/case_id
        respond:
          - action: start ai agent
            definition: hive://ai_agent/case-investigator
            suppression:
              is_global: true
              keys:
                - case-investigator-rate-limit
              max_count: 20
              period: 1m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-agent:case-investigator
