version: 3
hives:
  dr-general:
    l1-bot-case-triage:
      data:
        detect:
          event: case_created
          op: exists
          path: event/case_id
        respond:
          - action: start ai agent
            definition: hive://ai_agent/l1-bot
            suppression:
              is_global: true
              keys:
                - l1-bot-rate-limit
              max_count: 10
              period: 1m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-agent:l1-bot
