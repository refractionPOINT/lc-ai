version: 3
hives:
  dr-general:
    general-analyst-on-mention:
      data:
        detect:
          event: case_note_added
          op: and
          rules:
            - op: contains
              path: event/metadata/content
              value: "@general-analyst"
            - op: is
              path: event/metadata/permitted/?
              value: ai_agent.exec
        respond:
          - action: start ai agent
            definition: hive://ai_agent/general-analyst
            suppression:
              is_global: true
              keys:
                - "general-analyst-{{ .event.event_id }}"
              max_count: 1
              period: 30m
      usr_mtd:
        enabled: true
        expiry: 0
        tags:
          - ai-agent:general-analyst
          - ai-rel:standalone:role:agent:general-analyst
